<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Alptekin Okey Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { 
            --bg: #1a1a2e; 
            --text: #fff; 
            --card: #16213e; 
            --primary: #e94560; 
            --accent: #ffd700; 
            --board: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* Navbar */
        .nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 15px; 
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .nav h1 { font-size: 18px; color: var(--accent); }
        .nav span { 
            font-size: 12px; 
            color: var(--accent); 
            background: rgba(255,215,0,0.1);
            padding: 4px 10px; 
            border-radius: 15px; 
        }

        /* Oyuncular - Üstte yatay */
        .players { 
            display: flex; 
            gap: 8px; 
            padding: 8px; 
            overflow-x: auto; 
            background: rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        
        .players::-webkit-scrollbar { display: none; }
        
        .player { 
            background: rgba(255,255,255,0.1); 
            padding: 8px 12px; 
            border-radius: 12px; 
            text-align: center; 
            min-width: 70px;
            border: 2px solid transparent;
            flex-shrink: 0;
        }
        
        .player.active { border-color: var(--accent); background: rgba(255,215,0,0.2); }
        .player .avatar { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            background: var(--primary); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 4px;
            font-weight: bold;
        }
        .player .name { font-size: 11px; font-weight: bold; }
        .player .count { font-size: 10px; color: #aaa; }

        /* Masa - Ortada */
        .table { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            padding: 10px;
            background: var(--board);
            position: relative;
        }

        /* Zar alanı (başlangıçta) */
        .dice-area { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--accent);
        }
        
        .dice { 
            font-size: 50px; 
            cursor: pointer;
            animation: none;
        }
        
        .dice.rolling { animation: roll 0.5s infinite; }
        
        @keyframes roll { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        /* Oyun merkezi */
        .center { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            width: 100%;
        }
        
        .piles { 
            display: flex; 
            gap: 30px; 
            align-items: center;
        }
        
        .pile-box { text-align: center; }
        .pile-box span { font-size: 10px; color: rgba(255,255,255,0.7); display: block; margin-bottom: 4px; }
        
        .pile { 
            width: 45px; 
            height: 65px; 
            background: linear-gradient(135deg, #fff9e6, #e6e4d5); 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
            font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            cursor: pointer;
            position: relative;
        }
        
        .pile.deck { background: linear-gradient(135deg, #2c3e50, #34495e); color: white; font-size: 14px; }
        .pile.okey { background: linear-gradient(135deg, #ffd700, #ffed4e); animation: glow 2s infinite; }
        .pile.indicator { border: 2px solid var(--accent); }
        
        @keyframes glow { 
            0%, 100% { box-shadow: 0 0 10px rgba(255,215,0,0.4); } 
            50% { box-shadow: 0 0 20px rgba(255,215,0,0.8); } 
        }

        /* Atılan taşlar */
        .discards { 
            display: flex; 
            gap: 20px; 
            justify-content: center;
            width: 100%;
        }
        
        .discard-slot { 
            min-width: 50px; 
            height: 70px; 
            border: 2px dashed rgba(255,255,255,0.3); 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        
        .discard-slot.has-tile { border-style: solid; border-color: var(--accent); }

        /* Istaka - Altta yatay */
        .rack { 
            background: linear-gradient(180deg, #3e2723 0%, #271714 100%); 
            padding: 10px 5px;
            overflow-x: auto;
            flex-shrink: 0;
        }
        
        .rack::-webkit-scrollbar { display: none; }
        
        .tiles { 
            display: flex; 
            gap: 4px; 
            padding: 5px;
            min-width: max-content;
        }

        /* Okey Taşı */
        .tile { 
            width: 40px; 
            height: 58px; 
            background: linear-gradient(135deg, #fffdf0, #e6e4d5); 
            border-radius: 6px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.4); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
            border: 2px solid transparent;
        }
        
        .tile:active { transform: scale(0.95); }
        .tile.selected { border-color: var(--primary); transform: translateY(-5px); }
        .tile.red { color: #e74c3c; } .tile.blue { color: #3498db; } 
        .tile.black { color: #2c3e50; } .tile.yellow { color: #f39c12; }
        .tile.fake { color: #27ae60; font-size: 24px; }
        .tile.fake::after { content: "★"; }

        /* Kontroller */
        .controls { 
            display: flex; 
            gap: 8px; 
            padding: 10px; 
            background: rgba(0,0,0,0.5);
            justify-content: center;
            flex-shrink: 0;
        }
        
        .btn { 
            padding: 10px 16px; 
            border: none; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: bold; 
            color: white; 
            cursor: pointer;
            background: #3498db;
        }
        
        .btn.finish { background: #27ae60; }
        .btn.double { background: #9b59b6; }
        .btn.double.active { background: #e91e63; }

        /* Login */
        .login { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000;
            padding: 20px;
        }
        
        .login-box { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 320px;
            text-align: center;
        }
        
        .login-box h2 { color: var(--accent); margin-bottom: 20px; }
        .login-box input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 16px;
        }
        
        .login-box button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 10px; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer;
        }
        
        .btn-create { background: var(--primary); color: white; }
        .btn-join { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); }

        /* Bildirim */
        .toast { 
            position: fixed; 
            top: 60px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(0,0,0,0.9); 
            color: white; 
            padding: 12px 24px; 
            border-radius: 25px; 
            font-size: 14px; 
            z-index: 2000;
            display: none;
            border-left: 3px solid var(--primary);
        }

        /* Menü */
        .menu { 
            display: none; 
            position: absolute; 
            top: 50px; 
            right: 10px; 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }
        
        .menu-item { 
            padding: 15px 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Giriş Ekranı -->
    <div class="login" id="login">
        <div class="login-box">
            <h2>🎴 Okey Pro</h2>
            <input type="text" id="playerName" placeholder="Adınız" maxlength="12">
            <input type="text" id="roomCode" placeholder="Oda Kodu (Katılmak için)">
            <button class="btn-create" onclick="createRoom()">Oda Kur</button>
            <button class="btn-join" onclick="joinRoom()">Odaya Katıl</button>
        </div>
    </div>

    <!-- Ana Oyun -->
    <div class="nav">
        <h1>🎴 Okey Pro</h1>
        <span id="roomId" onclick="copyCode()">-</span>
        <button onclick="toggleMenu()" style="background:none;border:none;color:white;font-size:20px;">☰</button>
    </div>

    <div class="menu" id="menu">
        <div class="menu-item" onclick="toggleTheme()">🌓 Tema</div>
        <div class="menu-item" onclick="showRules()">📋 Kurallar</div>
        <div class="menu-item" onclick="location.reload()">🔄 Yenile</div>
    </div>

    <div class="players" id="players"></div>

    <div class="table" id="table">
        <!-- Zar Aşaması -->
        <div class="dice-area" id="diceArea">
            <div style="font-size:14px;color:#aaa;">Gösterge için zara dokun</div>
            <div class="dice" id="dice" onclick="rollDice()">🎲</div>
        </div>

        <!-- Oyun Alanı -->
        <div class="center" id="gameCenter" style="display:none;">
            <div class="piles">
                <div class="pile-box">
                    <span>GÖSTERGE</span>
                    <div class="pile indicator" id="gosterge">?</div>
                </div>
                <div class="pile-box">
                    <span>DESTE</span>
                    <div class="pile deck" id="deck" onclick="drawCard()">52</div>
                </div>
                <div class="pile-box">
                    <span>OKEY</span>
                    <div class="pile okey" id="okey">?</div>
                </div>
            </div>

            <div class="discards">
                <div class="discard-slot" id="leftDiscard" onclick="takeFromDiscard()">
                    <span style="font-size:10px;text-align:center;">Soldan<br>Çek</span>
                </div>
                <div class="discard-slot" id="centerPer" onclick="openPer()">
                    <span style="font-size:10px;text-align:center;">Per<br>Aç</span>
                </div>
                <div class="discard-slot" id="rightDiscard" onclick="discardHere()">
                    <span style="font-size:10px;text-align:center;">Sağa<br>At</span>
                </div>
            </div>
        </div>
    </div>

    <div class="rack" id="rack">
        <div class="tiles" id="tiles"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="sortTiles('number')">🔢 Sayı</button>
        <button class="btn" onclick="sortTiles('color')">🎨 Renk</button>
        <button class="btn double" id="btnDouble" onclick="toggleDouble()">👥 Çift</button>
        <button class="btn finish" onclick="finishGame()">🏁 Bitti</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Değişkenler
        const COLORS = ['red', 'blue', 'black', 'yellow'];
        let game = {
            players: [],
            deck: [],
            current: 0,
            gosterge: null,
            okey: null,
            started: false,
            double: false,
            discarded: null,
            myTurn: false
        };
        
        let myId, myName, isHost = false;
        let peer = new Peer();
        let connections = [];
        let hand = [];
        let selected = new Set();
        let diceCount = 0;

        peer.on('open', id => myId = id);

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function createRoom() {
            myName = document.getElementById('playerName').value || 'Oyuncu';
            isHost = true;
            game.players.push({ id: myId, name: myName, count: 0 });
            
            document.getElementById('login').style.display = 'none';
            document.getElementById('roomId').innerText = myId;
            updatePlayers();
            
            document.getElementById('diceArea').style.display = 'flex';
            
            peer.on('connection', conn => {
                connections.push(conn);
                conn.on('data', handleData);
            });
        }

        function joinRoom() {
            myName = document.getElementById('playerName').value || 'Oyuncu';
            const code = document.getElementById('roomCode').value;
            
            const conn = peer.connect(code);
            conn.on('open', () => {
                document.getElementById('login').style.display = 'none';
                document.getElementById('roomId').innerText = code;
                conn.send({ type: 'join', name: myName, id: myId });
            });
            conn.on('data', handleData);
        }

        function handleData(data) {
            if (data.type === 'join') {
                game.players.push({ id: data.id, name: data.name, count: 0 });
                updatePlayers();
                broadcast({ type: 'state', players: game.players });
            }
            else if (data.type === 'state') {
                game.players = data.players;
                updatePlayers();
            }
            else if (data.type === 'start') {
                startGame(data.gosterge, data.okey, data.hand);
            }
        }

        function broadcast(data) {
            connections.forEach(c => c.send(data));
        }

        function updatePlayers() {
            const div = document.getElementById('players');
            div.innerHTML = game.players.map((p, i) => `
                <div class="player ${i === game.current ? 'active' : ''}">
                    <div class="avatar">${p.name[0]}</div>
                    <div class="name">${p.name}</div>
                    <div class="count">${p.count || 14} taş</div>
                </div>
            `).join('');
        }

        function rollDice() {
            if (!isHost) return;
            
            const dice = document.getElementById('dice');
            dice.classList.add('rolling');
            
            setTimeout(() => {
                dice.classList.remove('rolling');
                const result = Math.floor(Math.random() * 6) + 1;
                dice.innerText = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'][result - 1];
                
                diceCount++;
                if (diceCount === 2) {
                    setTimeout(initGame, 1000);
                }
            }, 600);
        }

        function initGame() {
            // Deste oluştur
            game.deck = [];
            for (let c of COLORS) {
                for (let n = 1; n <= 13; n++) {
                    game.deck.push({ color: c, num: n });
                    game.deck.push({ color: c, num: n });
                }
            }
            game.deck.push({ color: 'fake', num: 0 });
            game.deck.push({ color: 'fake', num: 0 });
            
            // Karıştır
            game.deck.sort(() => Math.random() - 0.5);
            
            // Gösterge ve Okey
            const g = game.deck.pop();
            game.gosterge = g;
            game.okey = { color: g.color, num: g.num === 13 ? 1 : g.num + 1 };
            
            // Dağıt
            game.players.forEach((p, i) => {
                const count = i === 0 ? 15 : 14;
                p.count = count;
                const h = [];
                for (let j = 0; j < count; j++) h.push(game.deck.pop());
                
                if (i === 0) {
                    hand = h;
                    renderHand();
                }
            });
            
            document.getElementById('diceArea').style.display = 'none';
            document.getElementById('gameCenter').style.display = 'flex';
            
            document.getElementById('gosterge').className = `pile indicator ${game.gosterge.color}`;
            document.getElementById('gosterge').innerText = game.gosterge.num;
            document.getElementById('okey').innerText = game.okey.num;
            document.getElementById('deck').innerText = game.deck.length;
            
            game.started = true;
            game.myTurn = true;
            updatePlayers();
        }

        function renderHand() {
            const div = document.getElementById('tiles');
            div.innerHTML = hand.map((t, i) => `
                <div class="tile ${t.color} ${selected.has(i) ? 'selected' : ''}" 
                     onclick="toggleSelect(${i})" 
                     ondblclick="discard(${i})">
                    ${t.color === 'fake' ? '' : t.num}
                </div>
            `).join('');
        }

        function toggleSelect(i) {
            if (selected.has(i)) selected.delete(i);
            else selected.add(i);
            renderHand();
        }

        function sortTiles(type) {
            if (type === 'number') {
                hand.sort((a, b) => (a.color === 'fake' ? 1 : 0) - (b.color === 'fake' ? 1 : 0) || a.num - b.num);
            } else {
                const order = { red: 0, blue: 1, black: 2, yellow: 3, fake: 4 };
                hand.sort((a, b) => order[a.color] - order[b.color] || a.num - b.num);
            }
            renderHand();
        }

        function toggleDouble() {
            game.double = !game.double;
            const btn = document.getElementById('btnDouble');
            btn.classList.toggle('active');
            btn.innerText = game.double ? '👥 Çift AÇIK' : '👥 Çift';
            showToast(game.double ? 'Çifte gitme modu!' : 'Normal mod');
        }

        function drawCard() {
            if (!game.myTurn) return;
            if (game.deck.length === 0) return;
            
            hand.push(game.deck.pop());
            document.getElementById('deck').innerText = game.deck.length;
            renderHand();
            showToast('Taş çektin');
        }

        function discard(index) {
            if (!game.myTurn) return;
            
            const tile = hand.splice(index, 1)[0];
            game.discarded = tile;
            
            // Sağ atılan taşı göster
            const slot = document.getElementById('rightDiscard');
            slot.innerHTML = `<div class="tile ${tile.color}" style="width:40px;height:58px;">${tile.num || ''}</div>`;
            slot.classList.add('has-tile');
            
            renderHand();
            
            if (hand.length === 0) {
                celebrate();
                showToast('Tebrikler! Kazandınız!');
            }
        }

        function discardHere() {
            // Seçili taşları at
            const indices = Array.from(selected).sort((a, b) => b - a);
            indices.forEach(i => discard(i));
            selected.clear();
        }

        function takeFromDiscard() {
            if (!game.myTurn || !game.discarded) return;
            hand.push(game.discarded);
            game.discarded = null;
            document.getElementById('leftDiscard').innerHTML = '<span style="font-size:10px;text-align:center;">Soldan<br>Çek</span>';
            document.getElementById('leftDiscard').classList.remove('has-tile');
            renderHand();
        }

        function openPer() {
            showToast('Per açma özelliği yakında!');
        }

        function finishGame() {
            if (hand.length > 1) {
                showToast('Bitmek için 1 taş kalmalı!');
                return;
            }
            celebrate();
            showToast('Oyun Bitti! +2 Puan');
        }

        function celebrate() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ffd700', '#ff6b6b', '#4ecdc4']
            });
        }

        function copyCode() {
            const code = document.getElementById('roomId').innerText;
            if (code !== '-') {
                navigator.clipboard.writeText(code);
                showToast('Kod kopyalandı: ' + code);
            }
        }

        function toggleMenu() {
            const m = document.getElementById('menu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function toggleTheme() {
            document.body.style.filter = document.body.style.filter === 'invert(1)' ? '' : 'invert(1)';
            toggleMenu();
        }

        function showRules() {
            alert('OKEY KURALLARI:\n\n1. 15/14 taşla başla\n2. Önce çek, sonra at\n3. Çift modu: 7 çift topla\n4. En az 1 per açmalısın\n5. Okey jokerdir');
            toggleMenu();
        }
    </script>
</body>
</html>
